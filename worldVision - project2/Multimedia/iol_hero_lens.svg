<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg" style="">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">IOL Hero Illustration</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Artistic illustration of an intraocular lens with optical rings and haptic arms</desc>
<defs>
  <radialGradient id="lensGrad" cx="42%" cy="38%" r="55%">
    <stop offset="0%" stop-color="#e8f4ff" stop-opacity="1"/>
    <stop offset="40%" stop-color="#b8d9f5" stop-opacity="1"/>
    <stop offset="75%" stop-color="#7ab8e8" stop-opacity="1"/>
    <stop offset="100%" stop-color="#3a85c8" stop-opacity="0.8"/>
  </radialGradient>
  <radialGradient id="innerGrad" cx="35%" cy="30%" r="60%">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
    <stop offset="50%" stop-color="#c8e4f8" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#5a9fd4" stop-opacity="0.3"/>
  </radialGradient>
  <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#a8d4f0" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#a8d4f0" stop-opacity="0"/>
  </radialGradient>
  <filter id="softBlur">
    <feGaussianBlur stdDeviation="3"/>
  </filter>
</defs>

<!-- Soft background glow -->
<ellipse cx="340" cy="210" rx="180" ry="170" fill="url(#glowGrad)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

