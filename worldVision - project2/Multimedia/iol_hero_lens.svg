<circle cx="340" cy="212" r="46" fill="none" stroke="#6aaee0" stroke-width="0.7" stroke-opacity="0.4" style="fill:none;stroke:rgb(106, 174, 224);color:rgb(255, 255, 255);stroke-width:0.7px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
