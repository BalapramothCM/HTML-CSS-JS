<circle cx="340" cy="210" r="158" fill="none" stroke="#5a9fd4" stroke-width="0.5" stroke-opacity="0.18" style="fill:none;stroke:rgb(90, 159, 212);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
