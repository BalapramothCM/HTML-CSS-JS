</g>
<g stroke="#7ab8e8" stroke-width="0.5" stroke-opacity="0.2" fill="none" style="fill:none;stroke:rgb(122, 184, 232);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
