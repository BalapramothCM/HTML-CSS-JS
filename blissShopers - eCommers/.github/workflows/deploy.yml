name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/id_rsa root@${{ secrets.SERVER_IP }} "
            cd /var/www/blissshop_BSB &&
            git pull origin main &&
            npm install &&

            # 🔥 PM2 Safe Restart (first-time + future deploys)
            if ! /root/.nvm/versions/node/v22.21.1/bin/pm2 list | grep -q 'blissshop-backend'; then
              /root/.nvm/versions/node/v22.21.1/bin/pm2 start server.js --name blissshop-backend
            else
              /root/.nvm/versions/node/v22.21.1/bin/pm2 restart blissshop-backend
            fi
          "